name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - '.github/workflows/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Load NVM for Node.js
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            # Navigation to project directory
            cd ~/AIJobPortal

            # --- 🧹 Disk Cleanup ---
            echo "🧹 Cleaning up disk space on EC2..."
            # Clear PM2 logs & temp
            pm2 flush || true
            rm -rf ~/.pm2/logs/* || true
            rm -rf /tmp/* || true
            
            # Clear caches
            npm cache clean --force || true
            
            # Optimize git storage
            git gc --prune=now || true
            # Show current disk usage
            df -h

            echo "📥 Pulling latest changes from main..."
            git fetch origin main
            git reset --hard origin/main

            # --- 🚀 Deploy Node.js (Server) ---
            echo "📦 Setting up Node.js Backend..."
            cd server
            npm install --production
            
            # Restart with PM2 - Try to restart, if fails (first time), then start
            pm2 restart server || pm2 start src/server.js --name server
            cd ..

            # Clean up old python pm2 process if it exists
            pm2 delete python-service || true

            # Save PM2 state to survive reboots
            pm2 save
            
            echo "✅ Deployment Successful!"
