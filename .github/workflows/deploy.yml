name: Deploy Backend & Python Service

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'python-service/**'
      - '.github/workflows/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Load NVM for Node.js
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            # Navigation to project directory
            cd ~/AIJobPortal

            # --- 🧹 Disk Cleanup ---
            echo "🧹 Cleaning up disk space on EC2..."
            # Clear PM2 logs & temp
            pm2 flush || true
            rm -rf ~/.pm2/logs/* || true
            rm -rf /tmp/* || true
            
            # Clear caches
            npm cache clean --force || true
            
            # Remove python bytecode
            find . -name "__pycache__" -type d -exec rm -rf {} + || true
            find . -name "*.pyc" -delete || true
            
            # Optimize git storage
            git gc --prune=now || true
            # Show current disk usage
            df -h

            echo "📥 Pulling latest changes from main..."
            git pull origin main

            # --- 🚀 Deploy Node.js (Server) ---
            echo "📦 Setting up Node.js Backend..."
            cd server
            npm install --production
            
            # Restart with PM2 - Try to restart, if fails (first time), then start
            pm2 restart server || pm2 start src/server.js --name server
            cd ..

            # --- 🐍 Deploy Python Service ---
            echo "📦 Setting up Python Service..."
            cd python-service
            
            # Create venv if missing on EC2
            if [ ! -d "venv" ]; then
                echo "🔧 Creating virtual environment..."
                python3 -m venv venv
            fi
            
            # Install dependencies
            ./venv/bin/pip install -r requirements.txt
            
            # Restart with PM2 using the venv python interpreter
            pm2 restart python-service || pm2 start main.py --name python-service --interpreter ./venv/bin/python3
            cd ..

            # Save PM2 state to survive reboots
            pm2 save
            
            echo "✅ Deployment Successful!"
